<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindArena</title>

    <link rel="stylesheet" href="style.css">
</head>



<body>

    <div id="background"></div>

    <div class="content">
        <!-- Header Section -->
        <header id="header">
            <div class="app-Name">
                <nav style="margin: 20px;font-size: 20px; font-weight: bold;">
                    <h2>MindArena</h2>
                </nav>
            </div>
            <div class="other-Links">
                <button>
                    <nav>
                        <a href="" class="btn-header">Log In</a>
                    </nav>
                </button>
                <button>
                    <nav>
                        <a href="" class="btn-header">Sign Up</a>
                    </nav>
                </button>
            </div>
        </header>
        <!-- Hero Section -->
        <section class="hero">
            <h1>Master the Mind</h1>
            <p>Psychological strategy games.</p>

            <button>Play</button>
        </section>

        


    </div>

    <!-- JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>


        <script>
            VANTA.FOG({
                el: "#background",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                highlightColor: 0x241d06,
                lowlightColor: 0x3a335b,
                baseColor: 0x725c5c
            })
        </script>
</body>



</html>
